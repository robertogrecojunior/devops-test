name: DevOps Test Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do cĂ³digo
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: docker build -t devops-test .

      - name: Subir container para teste
        run: |
          docker run -d -p 8080:8080 --name devops-test-container devops-test
          sleep 5

      - name: Teste simples da aplicaĂ§Ă£o
        run: |
          echo "Aguardando aplicaĂ§Ă£o subir..."
     
          sleep 5
      
          echo "Chamando aplicaĂ§Ă:"
          curl http://localhost:8080
      
          echo ""
	  echo "Logs do container:"
          docker logs devops-test-container

      - name: Remover container de teste
        run: docker rm -f devops-test-container

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
